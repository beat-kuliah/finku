version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/"
    schema:
      - "migrations/000001_create_users.up.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
